<!DOCTYPE html>
<html>
<head>
    <title>Asset Debug</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #333; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .info { color: #2196F3; }
        pre { background: #000; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Asset Debug Tool</h1>
    
    <div class="section">
        <h2>Database Status</h2>
        <button onclick="checkDatabase()">Check Database</button>
        <div id="db-status"></div>
    </div>

    <div class="section">
        <h2>Seed Assets</h2>
        <button onclick="seedAssets()">Seed Assets</button>
        <div id="seed-status"></div>
    </div>

    <div class="section">
        <h2>Asset Overrides</h2>
        <button onclick="checkOverrides()">Check Overrides</button>
        <div id="override-status"></div>
    </div>

    <div class="section">
        <h2>Debug Info</h2>
        <pre id="debug-info">Click buttons above to debug...</pre>
    </div>

    <script>
        async function checkDatabase() {
            const status = document.getElementById('db-status');
            status.innerHTML = 'Checking...';
            
            try {
                const response = await fetch('/api/trpc/system.debug');
                const data = await response.json();
                
                status.innerHTML = `
                    <div class="success">✅ Database Connected</div>
                    <div class="info">Asset Count: ${data.result?.data?.assetCount || 0}</div>
                    <pre>${JSON.stringify(data.result?.data?.sampleAssets || [], null, 2)}</pre>
                `;
            } catch (error) {
                status.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        async function seedAssets() {
            const status = document.getElementById('seed-status');
            status.innerHTML = 'Seeding...';
            
            try {
                const response = await fetch('/api/trpc/system.seedAssets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                
                if (data.result?.data?.success) {
                    status.innerHTML = `<div class="success">✅ ${data.result.data.message}</div>`;
                    // Check database again after seeding
                    setTimeout(checkDatabase, 1000);
                } else {
                    status.innerHTML = `<div class="error">❌ Failed: ${JSON.stringify(data)}</div>`;
                }
            } catch (error) {
                status.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        async function checkOverrides() {
            const status = document.getElementById('override-status');
            status.innerHTML = 'Checking...';
            
            try {
                // Check the tRPC endpoint
                const input = btoa(JSON.stringify({}));
                const response = await fetch(`/api/trpc/system.assets?input=${encodeURIComponent(input)}`);
                const data = await response.json();
                
                status.innerHTML = `
                    <div class="info">Response Status: ${response.status}</div>
                    <div class="info">Response Structure:</div>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                
                // Also check local overrides file
                try {
                    const localResponse = await fetch('/generated-assets/overrides.json');
                    if (localResponse.ok) {
                        const localData = await localResponse.json();
                        status.innerHTML += `
                            <div class="success">✅ Local overrides found</div>
                            <pre>${JSON.stringify(localData, null, 2)}</pre>
                        `;
                    } else {
                        status.innerHTML += `<div class="info">ℹ️ No local overrides file</div>`;
                    }
                } catch (e) {
                    status.innerHTML += `<div class="info">ℹ️ No local overrides file</div>`;
                }
            } catch (error) {
                status.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        // Auto-check on load
        window.onload = () => {
            checkDatabase();
        };
    </script>
</body>
</html>
