<!DOCTYPE html>
<html>
<head>
    <title>Seed Assets</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; font-size: 16px; }
        .status { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Database Asset Seeding</h1>
    
    <button onclick="checkStatus()">Check Database Status</button>
    <button onclick="seedAssets()">Seed Assets</button>
    
    <div id="status"></div>
    
    <script>
        async function checkStatus() {
            const status = document.getElementById('status');
            try {
                const response = await fetch('/api/trpc/system.debug');
                const data = await response.json();
                status.innerHTML = `
                    <div class="status info">
                        <strong>Database Status:</strong><br>
                        Connected: ${data.result.data.json.databaseConnected}<br>
                        Asset Count: ${data.result.data.json.assetCount}<br>
                        Sample Assets: ${JSON.stringify(data.result.data.json.sampleAssets, null, 2)}
                    </div>
                `;
            } catch (error) {
                status.innerHTML = `<div class="status error">Error checking status: ${error.message}</div>`;
            }
        }
        
        async function seedAssets() {
            const status = document.getElementById('status');
            status.innerHTML = '<div class="status info">Seeding assets... please wait</div>';
            
            try {
                const response = await fetch('/api/trpc/system.seedAssets', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({})
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    status.innerHTML = `<div class="status success">✅ ${data.result.data.json.message}</div>`;
                    // Auto-check status after seeding
                    setTimeout(checkStatus, 1000);
                } else {
                    status.innerHTML = `<div class="status error">❌ Error: ${data.result.data.json.message}</div>`;
                }
            } catch (error) {
                status.innerHTML = `<div class="status error">❌ Error seeding assets: ${error.message}</div>`;
            }
        }
        
        // Auto-check status on load
        window.onload = checkStatus;
    </script>
</body>
</html>
